<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --surface: #0c0c10;
    --surface-elevated: #121218;
    --surface-hover: #181820;
    --border: rgba(255,255,255,0.05);
    --border-strong: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent-light: #a89aff;
    --accent-glow: rgba(124,106,247,0.5);
    --text: #f8f8fc;
    --text-secondary: #a8a8b8;
    --text-muted: #6a6a7a;
    --discord: #5865F2;
    --discord-glow: rgba(88,101,242,0.5);
    --success: #22c55e;
    --warning: #f59e0b;
    --info: #3b82f6;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* Animated Background */
  .bg-animated {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: float 20s ease-in-out infinite;
  }

  .orb-1 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.4) 0%, transparent 70%);
    top: -200px;
    left: -100px;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(247,106,140,0.3) 0%, transparent 70%);
    top: 30%;
    right: -150px;
    animation-delay: -5s;
  }

  .orb-3 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(106,200,247,0.25) 0%, transparent 70%);
    bottom: 10%;
    left: 20%;
    animation-delay: -10s;
  }

  .orb-4 {
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(168,106,247,0.3) 0%, transparent 70%);
    bottom: -100px;
    right: 20%;
    animation-delay: -15s;
  }

  @keyframes float {
    0%, 100% {
      transform: translate(0, 0) scale(1);
    }
    25% {
      transform: translate(50px, -30px) scale(1.05);
    }
    50% {
      transform: translate(-30px, 50px) scale(0.95);
    }
    75% {
      transform: translate(-50px, -20px) scale(1.02);
    }
  }

  /* Particle effect */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(124,106,247,0.4);
    border-radius: 50%;
    animation: particleFloat 15s linear infinite;
  }

  .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
  .particle:nth-child(2) { left: 20%; animation-delay: -2s; animation-duration: 18s; }
  .particle:nth-child(3) { left: 30%; animation-delay: -4s; animation-duration: 14s; }
  .particle:nth-child(4) { left: 40%; animation-delay: -6s; animation-duration: 16s; }
  .particle:nth-child(5) { left: 50%; animation-delay: -8s; animation-duration: 13s; }
  .particle:nth-child(6) { left: 60%; animation-delay: -10s; animation-duration: 17s; }
  .particle:nth-child(7) { left: 70%; animation-delay: -12s; animation-duration: 15s; }
  .particle:nth-child(8) { left: 80%; animation-delay: -14s; animation-duration: 11s; }
  .particle:nth-child(9) { left: 90%; animation-delay: -3s; animation-duration: 19s; }
  .particle:nth-child(10) { left: 5%; animation-delay: -7s; animation-duration: 14s; }

  @keyframes particleFloat {
    0% {
      transform: translateY(100vh) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 1;
    }
    90% {
      opacity: 1;
    }
    100% {
      transform: translateY(-100vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Subtle grid pattern */
  .grid-pattern {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 100px 40px 140px;
    position: relative;
    z-index: 1;
  }

  /* Header Section */
  .header { 
    margin-bottom: 80px; 
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .header-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: linear-gradient(135deg, rgba(124,106,247,0.2) 0%, rgba(124,106,247,0.05) 100%);
    border: 1px solid rgba(124,106,247,0.3);
    padding: 10px 18px;
    border-radius: 100px;
    margin-bottom: 32px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(124,106,247,0.15);
  }

  .header-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent-glow);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  h1 {
    font-size: clamp(48px, 8vw, 84px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #fff 20%, var(--accent-light) 60%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
  }

  .subtitle { 
    color: var(--text-secondary); 
    font-size: 18px; 
    max-width: 480px; 
    line-height: 1.7;
    font-weight: 400;
  }

  /* Section divider */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-strong) 0%, transparent 100%);
  }

  /* Grid Layout - Desktop: Bigger Cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    margin-bottom: 60px;
  }

  /* Card Styles - Bigger on Desktop */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }

  .card:hover {
    border-color: rgba(124,106,247,0.4);
    transform: translateY(-6px) scale(1.01);
    box-shadow: 
      0 32px 100px rgba(0,0,0,0.6),
      0 0 0 1px rgba(124,106,247,0.2),
      0 0 80px rgba(124,106,247,0.15);
  }

  .card:hover::before {
    opacity: 1;
  }

  /* Discord Card */
  .card.discord-card {
    background: linear-gradient(135deg, rgba(88,101,242,0.15) 0%, var(--surface) 50%);
    border-color: rgba(88,101,242,0.25);
  }

  .card.discord-card:hover {
    border-color: rgba(88,101,242,0.5);
    box-shadow: 
      0 32px 100px rgba(0,0,0,0.6),
      0 0 0 1px rgba(88,101,242,0.25),
      0 0 80px rgba(88,101,242,0.2);
  }

  .card.discord-card .card-category {
    background: rgba(88,101,242,0.25);
    color: #b8c0ff;
  }

  .card-thumb {
    position: relative;
    height: 220px;
    background: var(--surface-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card:hover .card-thumb img {
    transform: scale(1.08);
  }

  .thumb-overlay {
    position: absolute;
    inset: 0;
    opacity: 0;
    background: linear-gradient(135deg, rgba(124,106,247,0.2) 0%, transparent 60%);
    transition: opacity 0.4s;
    z-index: 1;
  }

  .card:hover .thumb-overlay { opacity: 1; }

  .thumb-gradient {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
    z-index: 2;
  }

  /* Status Badges */
  .status-badge {
    position: absolute;
    top: 16px; right: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    animation: statusPulse 2s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-live { color: var(--success); border-color: rgba(34,197,94,0.4); }
  .status-live::before { background: var(--success); box-shadow: 0 0 10px var(--success); }
  .status-wip  { color: var(--warning); border-color: rgba(245,158,11,0.4); }
  .status-wip::before { background: var(--warning); box-shadow: 0 0 10px var(--warning); }
  .status-beta { color: var(--info); border-color: rgba(59,130,246,0.4); }
  .status-beta::before { background: var(--info); box-shadow: 0 0 10px var(--info); }

  .card-body { padding: 28px 28px 28px; }

  .card-meta { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 14px; 
  }

  .card-category {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-light);
    background: rgba(124,106,247,0.15);
    padding: 5px 12px;
    border-radius: 8px;
    font-weight: 600;
  }

  .card-year { 
    font-family: 'Space Mono', monospace; 
    font-size: 11px; 
    color: var(--text-muted);
    font-weight: 400;
  }

  .card-title { 
    font-size: 24px; 
    font-weight: 700; 
    letter-spacing: -0.02em; 
    margin-bottom: 12px;
    color: var(--text);
  }

  .card-desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 24px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-actions { 
    display: flex; 
    gap: 12px; 
  }

  .btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    border: none;
    text-decoration: none;
  }

  .btn-visit { 
    background: linear-gradient(135deg, var(--accent) 0%, #5d4dd4 100%);
    color: #fff;
    box-shadow: 0 6px 28px rgba(124,106,247,0.35);
  }

  .btn-visit:hover { 
    background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 36px rgba(124,106,247,0.5);
  }

  .btn-explore { 
    background: var(--surface-elevated);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }

  .btn-explore:hover { 
    background: var(--surface-hover);
    border-color: rgba(124,106,247,0.5);
    color: var(--text);
  }

  .btn-discord {
    background: linear-gradient(135deg, var(--discord) 0%, #3d45b0 100%);
    color: #fff;
    box-shadow: 0 6px 28px rgba(88,101,242,0.35);
  }

  .btn-discord:hover {
    background: linear-gradient(135deg, #7289ff 0%, var(--discord) 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 36px rgba(88,101,242,0.5);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,8,0.9);
    backdrop-filter: blur(16px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { 
    display: flex; 
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
  }

  @keyframes fadeIn { 
    from { opacity: 0; } 
    to { opacity: 1; } 
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 28px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    box-shadow: 
      0 50px 120px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.04);
  }

  @keyframes slideUp {
    from { transform: translateY(40px) scale(0.97); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .modal-header {
    padding: 36px 36px 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }

  .modal-close {
    background: var(--surface-elevated);
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    width: 44px; height: 44px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .modal-close:hover { 
    background: var(--surface-hover); 
    color: var(--text);
    border-color: rgba(124,106,247,0.5);
    transform: rotate(90deg);
  }

  .modal-title { 
    font-size: 32px; 
    font-weight: 800; 
    letter-spacing: -0.02em; 
    margin-bottom: 8px;
    color: var(--text);
  }

  .modal-cat {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }

  .modal-body { padding: 32px 36px 36px; }

  .modal-desc { 
    color: var(--text-secondary); 
    font-size: 16px; 
    line-height: 1.8; 
    margin-bottom: 24px;
  }

  .tags { 
    display: flex; 
    gap: 10px; 
    flex-wrap: wrap; 
    margin-bottom: 32px; 
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface-elevated);
    border: 1px solid var(--border-strong);
    padding: 6px 14px;
    border-radius: 10px;
    transition: all 0.25s;
  }

  .tag:hover {
    border-color: rgba(124,106,247,0.5);
    color: var(--text);
  }

  .video-section { margin-bottom: 28px; }

  .video-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .video-label::after { 
    content: ''; 
    flex: 1; 
    height: 1px; 
    background: linear-gradient(90deg, var(--border-strong) 0%, transparent 100%);
  }

  .video-wrapper {
    background: var(--surface-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 16/9;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-placeholder { 
    text-align: center;
    padding: 24px;
  }

  .play-btn {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent) 0%, #5d4dd4 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    border: none;
    box-shadow: 0 10px 40px rgba(124,106,247,0.4);
  }

  .play-btn:hover { 
    transform: scale(1.12); 
    background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
    box-shadow: 0 14px 50px rgba(124,106,247,0.6);
  }

  .no-video-text { 
    font-size: 14px; 
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  .click-text { 
    font-size: 14px; 
    color: var(--text-secondary);
  }

  .video-frame {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: none;
    display: none;
  }

  .modal-footer { 
    margin-top: 16px;
    display: flex;
    gap: 14px;
  }

  .modal-footer .btn { 
    flex: initial; 
    padding: 16px 36px;
    font-size: 15px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { 
    background: var(--border-strong); 
    border-radius: 4px;
    border: 2px solid var(--surface);
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(124,106,247,0.5); }

  /* ==================== RESPONSIVE ==================== */

  /* Tablet (768px - 1024px) */
  @media (max-width: 1024px) {
    .container {
      padding: 80px 32px 100px;
    }

    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card-thumb {
      height: 180px;
    }

    .card-title {
      font-size: 20px;
    }

    .card-body {
      padding: 22px 22px 24px;
    }
  }

  /* Mobile (< 768px) */
  @media (max-width: 768px) {
    .container {
      padding: 60px 20px 80px;
    }

    .header {
      margin-bottom: 48px;
    }

    .header-tag {
      font-size: 10px;
      padding: 8px 14px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(36px, 12vw, 56px);
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      max-width: 100%;
    }

    .section-divider {
      margin-bottom: 24px;
    }

    .grid {
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }

    .card {
      border-radius: 20px;
    }

    .card-thumb {
      height: 160px;
    }

    .card-body {
      padding: 18px 20px 22px;
    }

    .card-title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      margin-bottom: 18px;
    }

    .card-actions {
      gap: 10px;
    }

    .btn {
      padding: 12px 16px;
      font-size: 13px;
      border-radius: 12px;
    }

    .status-badge {
      top: 12px;
      right: 12px;
      padding: 5px 10px;
      font-size: 9px;
    }

    /* Modal Mobile */
    .modal-overlay {
      padding: 16px;
      align-items: flex-end;
    }

    .modal {
      border-radius: 24px 24px 0 0;
      max-height: 85vh;
      animation: slideUpMobile 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUpMobile {
      from { transform: translateY(100%); opacity: 1; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      padding: 24px 24px 20px;
    }

    .modal-title {
      font-size: 22px;
    }

    .modal-body {
      padding: 20px 24px 28px;
    }

    .modal-desc {
      font-size: 14px;
    }

    .modal-footer {
      flex-direction: column;
    }

    .modal-footer .btn {

function playVideo(i, vi) {
  var p = currentGrid === 'community' ? communityCards[i] : projects[i];
  var v = p.videos[vi];
  if (!v || !v.url) return;
  var placeholder = document.getElementById('vp_' + i + '_' + vi);
  var frame = document.getElementById('vf_' + i + '_' + vi);
  if (placeholder) placeholder.style.display = 'none';
  if (frame) {
    frame.src = v.url + '?autoplay=1';
    frame.style.display = 'block';
  }
}

  document.body.style.overflow = '';
  currentIndex = -1;
  currentGrid = 'projects';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// Initialize
renderCards();
renderCommunityCards();
</script>
</body>
</html>
